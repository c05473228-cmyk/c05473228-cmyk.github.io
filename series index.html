<style>
body{
    margin:0;
    background:#0b0b0f;
    color:#fff;
    font-family:Arial,Helvetica,sans-serif;
}

/* ==== BUSCADOR ==== */
#searchBar{
    width:90%;
    margin:15px auto;
    display:block;
    padding:12px 15px;
    border-radius:10px;
    font-size:16px;
    border:none;
    outline:none;
    background:#111;
    color:white;
}

/* ====== GRID SERIES ====== */
.series-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}

.series-card{
    background:#111;
    border-radius:10px;
    padding:10px;
    cursor:pointer;
    transition:.2s;
}
.series-card:hover{
    transform:scale(1.05);
}
.series-card img{
    width:100%;
    border-radius:10px;
}
.series-title{
    text-align:center;
    margin-top:8px;
    font-size:15px;
}

/* ====== PANEL INFO ====== */
#seriesInfo{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000c;
    backdrop-filter:blur(4px);
    display:none;
    z-index:9999;
    padding:20px;
    overflow-y:auto;
}

.info-box{
    background:#111;
    padding:20px;
    border-radius:10px;
}

.closeInfo{
    float:right;
    background:red;
    padding:10px 13px;
    border-radius:50%;
    font-size:18px;
    border:none;
    cursor:pointer;
}

/* ====== REPRODUCTOR ====== */
#playerOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:rgba(0,0,0,0.85);
    display:none;
    z-index:999999;
    align-items:center;
    justify-content:center;
}

#playerBox{
    width:90%;
    max-width:900px;
    background:#111;
    border-radius:10px;
    padding:10px;
    position:relative;
}

#playerFrame{
    width:100%;
    height:55vh;
    border:none;
    border-radius:10px;
}

#closePlayer{
    position:absolute;
    top:-15px;
    right:-15px;
    background:red;
    border:none;
    color:#fff;
    padding:10px 13px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
}



.season-title{
    background:#111;
    color:gold;
    padding:12px;
    border:1px solid gold;
    border-radius:8px;
    margin:15px 0;
}

.episode-btn{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    background:#1a1a1a;
    color:white;
    border:none;
    border-radius:8px;
}
.episode-btn:hover{
    background:gold;
    color:#000;
}
    
</style>
</head>

<!-- ========== BUSCADOR ========== -->
<input type="text" id="searchBar" placeholder="Buscar series..." onkeyup="searchSeries()">

<div class="series-grid" id="seriesGrid"></div>

<!-- ===================== PANEL DE INFO ===================== -->
<div id="seriesInfo">
    <div class="info-box" id="infoContent"></div>
</div>

<!-- ===================== REPRODUCTOR ===================== -->
<div id="playerOverlay">
    <div id="playerBox">
        <button id="closePlayer">✖</button>
        <iframe id="playerFrame" allowfullscreen></iframe>

/* ===================== GENERAR GRID ===================== */
const grid = document.getElementById("seriesGrid");

function loadGrid(list){
    grid.innerHTML = "";
    list.forEach((serie, index) => {
        grid.innerHTML += `
            <div class="series-card" onclick="openSeries(${seriesData.indexOf(serie)})">
                <img src="${serie.poster}">
                <div class="series-title">${serie.title}</div>
            </div>
        `;
    });
}

loadGrid(seriesData);

/* ===================== BUSCADOR ===================== */
function searchSeries(){
    const text = document.getElementById("searchBar").value.toLowerCase();
    const filtered = seriesData.filter(s => s.title.toLowerCase().includes(text));
    loadGrid(filtered);
}

/* ===================== PANEL INFO ===================== */
function openSeries(i){
    const box = seriesData[i];

    let html = `
        <button class="closeInfo" onclick="closeInfo()">✖</button>
        <h2>${box.title}</h2>
        <p>${box.description}</p>
        <hr>
    `;

    box.seasons.forEach(season => {
        html += `<div class="season-title">${season.name}</div>`;
        season.episodes.forEach(ep => {
            html += `
                <button class="episode-btn" onclick="playEpisode('${ep.url}')">
                    ▶ ${ep.title}
                </button>
            `;
        });
    });

    document.getElementById("infoContent").innerHTML = html;
    document.getElementById("seriesInfo").style.display = "block";
}

function closeInfo(){
    document.getElementById("seriesInfo").style.display = "none";
}

/* ===================== REPRODUCTOR ===================== */
function playEpisode(url){
    document.getElementById("playerFrame").src = url;
    document.getElementById("playerOverlay").style.display = "flex";
}

document.getElementById("closePlayer").addEventListener("click", ()=>{
    document.getElementById("playerFrame").src = "";
    document.getElementById("playerOverlay").style.display = "none";
});
</script>
