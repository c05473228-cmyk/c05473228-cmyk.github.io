<!DOCTYPE html>
<html lang="es">
<head>

  <script src="https://quge5.com/88/tag.min.js" data-zone="234795" async data-cfasync="false"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App de Películas</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:#111;
  position:sticky;
  top:0;
  z-index:100;
}

header h1{
  color:#e50914;
}

header input{
  padding:10px 15px;
  border:none;
  border-radius:20px;
  width:250px;
  outline:none;
}

/* HERO */
.hero{
  height:70vh;
  background:url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba') center/cover;
  display:flex;
  align-items:end;
  padding:40px;
}

.hero-content{
  max-width:500px;
}

.hero h2{
  font-size:3rem;
  margin-bottom:10px;
}

.hero p{
  margin-bottom:20px;
  color:#ddd;
}

.hero button{
  padding:12px 22px;
  border:none;
  border-radius:8px;
  background:#e50914;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* SECCIONES */
.section{
  padding:30px 40px;
}

.section h3{
  margin-bottom:15px;
  font-size:1.6rem;
}

/* CARRUSEL */
.carousel-container{
  position:relative;
}

.carousel{
  display:flex;
  gap:15px;
  overflow-x:auto;
  scroll-behavior:smooth;
  scrollbar-width:none;
}

.carousel::-webkit-scrollbar{
  display:none;
}

.card{
  min-width:220px;
  height:320px;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  flex-shrink:0;
  cursor:pointer;
  transition:transform 0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card .info{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  padding:15px;
  background:linear-gradient(transparent, rgba(0,0,0,0.9));
}

.arrow{
  position:absolute;
  top:40%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.7);
  border:none;
  color:white;
  font-size:2rem;
  width:45px;
  height:60px;
  cursor:pointer;
  z-index:10;
}

.left{
  left:-10px;
}

.right{
  right:-10px;
}

footer{
  text-align:center;
  padding:30px;
  color:#888;
}

/* RESPONSIVE */
@media(max-width:768px){
  header{
    flex-direction:column;
    gap:15px;
  }

  header input{
    width:100%;
  }

  .hero h2{
    font-size:2rem;
  }

  .card{
    min-width:160px;
    height:240px;
  }
}
</style>
</head>
<body>

<header>
  <h1>CinePlus</h1>
  <input type="text" placeholder="Buscar películas...">
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Avatar 3</h2>
    <p>Descubre una nueva aventura épica en Pandora.</p>
    <button>Ver Ahora</button>
  </div>
</section>

<!-- CARRUSEL 1 -->
<section class="section">
  <h3>Tendencias</h3>

  <div class="carousel-container">
    <button class="arrow left" onclick="scrollCarousel('trend', -300)">❮</button>

    <div class="carousel" id="trend">
      <div class="card"><img src="https://picsum.photos/300/450?1"><div class="info">Batman</div></div>
      <div class="card"><img src="https://picsum.photos/300/450?2"><div class="info">Joker</div></div>
      <div class="card"><img src="https://picsum.photos/300/450?3"><div class="info">Interstellar</div></div>
      <div class="card"><img src="https://picsum.photos/300/450?4"><div class="info">Dune</div></div>
      <div class="card"><img src="https://picsum.photos/300/450?5"><div class="info">Titanic</div></div>
      <div class="card"><img src="https://picsum.photos/300/450?6"><div class="info">Matrix</div></div>
    </div>

    <button class="arrow right" onclick="scrollCarousel('trend', 300)">❯</button>
  </div>
</section>

<!-- CARRUSEL 2 -->
<section class="section">
  <h3>Acción</h3>

  <div class="carousel-container">
    <button class="arrow left" onclick="scrollCarousel('action', -300)">❮</button>

    <div class="carousel" id="action">
      <div class="card"><img src="https://picsum.photos/300/450?7"><div class="info">John Wick</div></div>
      <div class="card"><img src="https://picsum.photos/300/450?8"><div class="info">Mad Max</div></div>
      <div class="card"><img src="https://picsum.photos/300/450?9"><div class="info">Gladiador</div></div>
      <div class="card"><img src="https://picsum.photos/300/450?10"><div class="info">300</div></div>
      <div class="card"><img src="https://picsum.photos/300/450?11"><div class="info">Transformers</div></div>
    </div>

    <button class="arrow right" onclick="scrollCarousel('action', 300)">❯</button>
  </div>
</section>

<footer>
  © 2026 CinePlus
</footer>

<script>
function scrollCarousel(id, amount){
  const carousel = document.getElementById(id);
  carousel.scrollBy({
    left: amount,
    behavior: "smooth"
  });
}
</script>

</body>
</html>
